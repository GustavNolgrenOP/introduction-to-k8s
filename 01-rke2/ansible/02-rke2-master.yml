---
# 02-rke2-master.yml
# Installs and configures RKE2 server on the master node
# Must complete before running 04-rke2-workers.yml

- name: Install and configure RKE2 on master
  hosts: master
  become: true

  tasks:
    - name: Create RKE2 config directory
      file:
        path: /etc/rancher/rke2
        state: directory
        mode: "0755"

    - name: Configure insecure registry for RKE2
      copy:
        dest: /etc/rancher/rke2/registries.yaml
        content: |
          mirrors:
            "192.168.100.10:32000":
              endpoint:
                - "http://192.168.100.10:32000"
        mode: "0644"

    - name: Write RKE2 master config
      copy:
        dest: /etc/rancher/rke2/config.yaml
        content: |
          token: {{ rke2_token }}
          tls-san:
            - {{ rke2_master_ip }}
            - k8s-master

    - name: Download and install RKE2
      shell: curl -sfL https://get.rke2.io | sh -
      args:
        creates: /usr/local/bin/rke2

    - name: Enable and start RKE2 server
      systemd:
        name: rke2-server
        enabled: true
        state: started

    - name: Wait for RKE2 server to be ready
      wait_for:
        port: 9345
        host: "{{ rke2_master_ip }}"
        delay: 10
        timeout: 300
        msg: "RKE2 server did not start in time"

    - name: Wait for kubeconfig to be generated
      wait_for:
        path: /etc/rancher/rke2/rke2.yaml
        timeout: 120

    - name: Fix kubeconfig server address
      replace:
        path: /etc/rancher/rke2/rke2.yaml
        regexp: "https://127.0.0.1:6443"
        replace: "https://{{ rke2_master_ip }}:6443"

    - name: Wait for master node to be Ready
      shell: >
        /var/lib/rancher/rke2/bin/kubectl
        --kubeconfig /etc/rancher/rke2/rke2.yaml
        get node k8s-master
        --no-headers
      register: node_status
      until: "'Ready' in node_status.stdout"
      retries: 30
      delay: 10
      changed_when: false

    - name: Show master node status
      debug:
        msg: "{{ node_status.stdout }}"
