---
# 04-fetch-kubeconfig.yml
# Fetches the kubeconfig from the master and saves it to WSL
# Run this after the cluster is fully up

- name: Fetch kubeconfig from master to WSL
  hosts: master
  become: true

  vars:
    local_kubeconfig_dir: "{{ lookup('env', 'HOME') }}/.kube/configs"
    local_kubeconfig_path: "{{ local_kubeconfig_dir }}/rke2-cluster.yaml"

  tasks:
    - name: Read kubeconfig from master
      slurp:
        src: /etc/rancher/rke2/rke2.yaml
      register: kubeconfig_content

    - name: Ensure local .kube/configs directory exists
      file:
        path: "{{ local_kubeconfig_dir }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false

    - name: Save kubeconfig locally
      copy:
        content: "{{ kubeconfig_content.content | b64decode | regex_replace('https://127.0.0.1:6443', 'https://' + rke2_master_ip + ':6443') }}"
        dest: "{{ local_kubeconfig_path }}"
        mode: "0600"
      delegate_to: localhost
      become: false

    - name: Show kubeconfig location
      debug:
        msg: "Kubeconfig saved to {{ local_kubeconfig_path }}"
      delegate_to: localhost
      become: false

    - name: Remind to export KUBECONFIG
      debug:
        msg: "Run: export KUBECONFIG={{ local_kubeconfig_path }}"
      delegate_to: localhost
      become: false

    - name: Test kubectl works locally
      shell: kubectl get nodes
      environment:
        KUBECONFIG: "{{ local_kubeconfig_path }}"
      register: kubectl_output
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Show cluster nodes
      debug:
        msg: "{{ kubectl_output.stdout_lines }}"
      delegate_to: localhost
      become: false
